image:
  repository: vamsidv2010/chatbot-simple
  tag: 4db09e9e1613d2dcbe60ebc5a8d88cc7a19fef88
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8501

ollama:
  host: http://host.docker.internal:11434
  model: qwen3:1.7b

phoenix:
  enabled: true
  image: arizephoenix/phoenix:latest
  project: chatbot

postgres:
  enabled: true
  image: postgres:16-alpine
  database: chatbot
  user: chatbot
  # dev-only plaintext password; refactor to a Kubernetes Secret in a future module
  password: chatbot123

auth:
  jwtSecretKey: "change-me-override-in-production"

replicaCount: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
