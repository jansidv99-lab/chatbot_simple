image:
  repository: vamsidv2010/chatbot-simple
  tag: 9d6fd16db42fbc20678b3ee2b24c0b3e6c9e875c
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8501

ollama:
  host: http://host.docker.internal:11434
  model: gemma4:e2b

phoenix:
  enabled: true
  image: arizephoenix/phoenix:latest
  project: chatbot

postgres:
  enabled: true
  image: postgres:16-alpine
  database: chatbot
  user: chatbot
  # dev-only plaintext password; refactor to a Kubernetes Secret in a future module
  password: chatbot123

replicaCount: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
