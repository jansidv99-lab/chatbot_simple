image:
  repository: vamsidv2010/chatbot-simple
  tag: 2bf83cd8b97a573c957c59f27c8b245efe014800
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8501

ollama:
  host: http://host.docker.internal:11434
  model: lfm2.5-thinking:latest

phoenix:
  enabled: true
  image: arizephoenix/phoenix:latest
  project: chatbot

postgres:
  enabled: true
  image: postgres:16-alpine
  database: chatbot
  user: chatbot
  # dev-only plaintext password; refactor to a Kubernetes Secret in a future module
  password: chatbot123

redis:
  enabled: true
  image: redis:7-alpine

api:
  enabled: true

prometheus:
  enabled: true
  image: prom/prometheus:latest

grafana:
  enabled: true
  image: grafana/grafana:latest
  adminPassword: "admin"

auth:
  jwtSecretKey: "change-me-override-in-production"

replicaCount: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
