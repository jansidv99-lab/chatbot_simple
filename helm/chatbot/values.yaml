image:
  repository: vamsidv2010/chatbot-simple
  tag: fa6e8b0edf954413e53aca3b560570749d02c0dc
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8501

ollama:
  host: http://host.docker.internal:11434
  model: lfm2.5-thinking:latest

phoenix:
  enabled: true
  image: arizephoenix/phoenix:latest
  project: chatbot

postgres:
  enabled: true
  image: postgres:16-alpine
  database: chatbot
  user: chatbot
  # dev-only plaintext password; refactor to a Kubernetes Secret in a future module
  password: chatbot123

replicaCount: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
