image:
  repository: vamsidv2010/chatbot-simple
  tag: dd5a824d5a22d13d2d43b4c8d024d42743daad6b
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8501

ollama:
  host: http://host.docker.internal:11434
  model: qwen2.5:3b

phoenix:
  enabled: true
  image: arizephoenix/phoenix:latest
  project: chatbot

postgres:
  enabled: true
  image: postgres:16-alpine
  database: chatbot
  user: chatbot
  # dev-only plaintext password; refactor to a Kubernetes Secret in a future module
  password: chatbot123

replicaCount: 1

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "512Mi"
    cpu: "500m"
